<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missed Your Target | Sherwood Adventure</title>
<meta name="robots" content="noindex, nofollow">
<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
<link rel="stylesheet" href="css/brand.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a href="#main-content" class="skip-nav">Skip to main content</a>

<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">

      <img src="images/logo.png" alt="Sherwood Adventure" class="nav-logo" width="160" height="48">

  </div>
</nav>

<section class="hero parallax" aria-label="Page not found" style="min-height: 80vh;">
  <div class="hero-content">
    <picture>
      <source srcset="images/logo.webp" type="image/webp">
      <img src="images/logo.png"
           alt="Sherwood Adventure"
           class="hero-logo"
           width="300"
           height="160">
    </picture>
    <picture>
      <source srcset="images/404-missed.webp" type="image/webp">
      <img src="images/404-missed.jpg" alt="Arrows missing the target" style="max-width: 380px; width: 90%; margin: 0 auto 1.5rem; display: block; border-radius: 12px;">
    </picture>
    <h1>Missed Your Target!</h1>
    <p class="hero-subtitle">
      The page you were aiming for was not found.<br>
      Even Robin Hood missed occasionally.
    </p>
    <a href="/" class="btn btn-gold btn-large">Head Back to the Forest</a>

</section>

<footer class="site-footer">
  <div class="footer-inner">
    <p class="footer-copy">&copy; 2025 Sherwood Adventure LLC &mdash; All rights reserved.</p>
  </div>
